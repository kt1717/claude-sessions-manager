<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Session Monitor</title>
<script src="/vendor/cytoscape.min.js"></script>
<style>
  :root { --bg:#12141a; --panel:#1b1f2a; --line:#2b3040; --fg:#e6e8ee; --dim:#8a92a6;
          --active:#3fb950; --idle:#d29922; --done:#6e7681; --unknown:#f85149; --accent:#4d8dff;
          --task:#b07cff; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.45 system-ui, sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px;
           border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:2;}
  header h1 { font-size:16px; margin:0; }
  header .spacer { flex:1; }
  input[type=search] { background:var(--panel); border:1px solid var(--line); color:var(--fg);
           border-radius:6px; padding:6px 10px; width:260px; }
  button { background:var(--panel); border:1px solid var(--line); color:var(--fg);
           border-radius:6px; padding:6px 10px; cursor:pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { border-color: var(--accent); color:#fff; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; padding:12px 16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .card .num { font-size:22px; font-weight:600; }
  .card .lbl { color:var(--dim); font-size:12px; }
  main { display:grid; grid-template-columns: 1fr 400px; gap:12px; padding:0 16px 16px; }
  #graphWrap, #detail { background:var(--panel); border:1px solid var(--line); border-radius:8px; }
  #graphWrap { position:relative; min-height:520px; overflow:hidden; }
  #cy { position:absolute; inset:0; }
  .graphhint { position:absolute; left:10px; bottom:8px; z-index:1; color:var(--dim); font-size:11px;
               pointer-events:none; }
  .graphtools { position:absolute; right:8px; top:8px; z-index:1; display:flex; gap:6px; }
  #detail { padding:12px; min-height:520px; overflow:auto; position:sticky; top:110px;
            max-height:calc(100vh - 130px); }
  .badge { display:inline-block; padding:0 7px; border-radius:9px; font-size:11px; margin-right:6px; }
  .badge.active { background:var(--active); color:#04160a; }
  .badge.idle { background:var(--idle); color:#231a02; }
  .badge.completed { background:var(--done); color:#111; }
  .badge.unknown { background:var(--unknown); color:#1c0605; }
  .dim { color:var(--dim); }
  .mono { font-family:ui-monospace, monospace; font-size:12px; }
  dl { display:grid; grid-template-columns:120px 1fr; gap:4px 8px; margin:8px 0; }
  dt { color:var(--dim); } dd { margin:0; word-break:break-all; }
  .actions { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
  h3 .rename { font-size:12px; font-weight:400; margin-left:8px; cursor:pointer; color:var(--accent); }
  .sec { border-top:1px solid var(--line); margin-top:12px; padding-top:10px; }
  .sec > b { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .prog { height:8px; background:var(--line); border-radius:5px; overflow:hidden; margin:6px 0; }
  .prog > i { display:block; height:100%; background:var(--active); }
  ul.todos { list-style:none; padding:0; margin:8px 0; }
  ul.todos li { padding:3px 0; display:flex; gap:8px; align-items:flex-start; }
  .tick { flex:0 0 auto; width:16px; text-align:center; }
  .tick.completed { color:var(--active); } .tick.in_progress { color:var(--idle); } .tick.pending { color:var(--dim); }
  li.in_progress { color:var(--fg); } li.pending { color:var(--dim); } li.completed { color:var(--dim); text-decoration:line-through; }
  #cySub { height:200px; background:var(--bg); border:1px solid var(--line); border-radius:6px; margin-top:8px; }
  #reader { white-space:pre-wrap; background:var(--bg); border:1px solid var(--line);
            border-radius:6px; padding:10px; margin-top:10px; max-height:280px; overflow:auto; }
  .evid { font-size:12px; color:var(--dim); margin:2px 0; }
  #toast { position:fixed; bottom:16px; right:16px; background:var(--panel);
           border:1px solid var(--accent); border-radius:8px; padding:10px 14px; display:none; z-index:5; }
  @media (max-width: 900px){ main { grid-template-columns:1fr; } #detail{position:static;} }
</style>
</head>
<body>
<header>
  <h1>Claude Session Monitor</h1>
  <input id="search" type="search" placeholder="filter by task / project / model / id">
  <div class="spacer"></div>
  <span id="refreshInfo" class="dim">–</span>
  <button id="pauseBtn">Pause</button>
</header>

<div class="cards" id="cards"></div>

<main>
  <div id="graphWrap">
    <div id="cy"></div>
    <div class="graphtools">
      <button id="fitBtn" title="Fit graph to view">Fit</button>
    </div>
    <div class="graphhint">click a task to expand/collapse · click a session for details · right-click to rename · scroll to zoom · drag to pan</div>
  </div>
  <div id="detail"><span class="dim">Click a session node to see details, todos, and its sub-agents.</span></div>
</main>
<div id="toast"></div>

<script>
const PALETTE = { active:'#3fb950', idle:'#d29922', completed:'#6e7681', unknown:'#f85149',
                  accent:'#4d8dff', task:'#b07cff', panel:'#1b1f2a', line:'#2b3040',
                  fg:'#e6e8ee', dim:'#8a92a6', bg:'#12141a' };
let paused=false, selectedId=null, treeData=null, cy=null, cySub=null, lastSig=null;
let expanded=new Set(), didInitFocus=false;
const $ = s => document.querySelector(s);
function esc(x){ const d=document.createElement('div'); d.textContent=x==null?'':String(x); return d.innerHTML; }
function unk(x){ return (x===null||x===undefined||x==='')?'<span class="dim">unknown</span>':esc(x); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.style.display='block';
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none',3500); }
async function api(path, opts){
  const r = await fetch(path, opts);
  if(!r.ok){ const b=await r.json().catch(()=>null); throw new Error((b&&b.detail)||('HTTP '+r.status)); }
  return r.json();
}
function missionKey(m){ return m.project_root || m.id; }
function missionName(m){ return m.name || m.project_root || 'unknown task'; }
function sessionName(s){ return s.label || s.title || (s.id? s.id.slice(0,8) : '?'); }

function matchesFilter(s, m){
  const q = $('#search').value.trim().toLowerCase();
  if(!q) return true;
  return [s.id, s.model, s.cwd, s.project_root, s.title, s.label, missionName(m)]
    .some(v => v && String(v).toLowerCase().includes(q));
}

function renderCards(missions){
  const all = missions.flatMap(m=>m.sessions);
  const by = st => all.filter(s=>s.status===st).length;
  const subs = all.reduce((a,s)=>a+((s.subagents&&s.subagents.length)||0),0);
  const tok = all.reduce((a,s)=>a+((s.usage&&s.usage.total_tokens)||0),0);
  const tokKnown = all.some(s=>s.usage&&s.usage.total_tokens!=null);
  const cards = [
    ['active', by('active')], ['idle', by('idle')], ['completed', by('completed')],
    ['tasks', missions.length], ['sub-agents', subs],
    ['known tokens', tokKnown? tok.toLocaleString():'unknown'],
  ];
  $('#cards').innerHTML = cards.map(([l,n])=>
    `<div class="card"><div class="num">${esc(n)}</div><div class="lbl">${esc(l)}</div></div>`).join('');
}

// ---- build cytoscape elements: root -> task(mission) -> session ----
// Sessions for a task are shown only when its task node is expanded (click to toggle),
// so a large tree stays readable. A search query auto-expands matching tasks.
function buildElements(data){
  const q = $('#search').value.trim().toLowerCase();
  const els = [{ data:{ id:'root', label:'Sessions', kind:'root' } }];
  for(const m of data.missions){
    const sess = m.sessions.filter(s=>matchesFilter(s,m));
    if(!sess.length) continue;
    const key = missionKey(m);
    const mid = 'm:'+key;
    const open = expanded.has(key) || !!q;   // search forces open
    const arrow = open ? '▾ ' : '▸ ';
    els.push({ data:{ id:mid, kind:'task', mkey:key, name:missionName(m),
                      label:arrow+missionName(m)+'  ('+sess.length+')' } });
    els.push({ data:{ id:'e:'+mid, source:'root', target:mid } });
    if(!open) continue;
    for(const s of sess){
      const sid = 's:'+s.id;
      els.push({ data:{ id:sid, label:sessionName(s), sub:(s.model||''), kind:'session',
                        status:s.status||'unknown', sessId:s.id } });
      els.push({ data:{ id:'e:'+sid, source:mid, target:sid } });
    }
  }
  return els;
}

const CY_STYLE = [
  { selector:'node', style:{ 'label':'data(label)', 'color':PALETTE.fg, 'font-size':11,
      'text-valign':'center', 'text-halign':'center', 'text-wrap':'wrap', 'text-max-width':130,
      'width':'label', 'height':'label', 'padding':'8px', 'shape':'round-rectangle',
      'background-color':PALETTE.panel, 'border-width':1.5, 'border-color':PALETTE.line } },
  { selector:'node[kind="root"]', style:{ 'background-color':PALETTE.accent, 'color':'#fff', 'border-color':PALETTE.accent, 'font-weight':'bold' } },
  { selector:'node[kind="task"]', style:{ 'border-color':PALETTE.task, 'border-width':2, 'font-weight':'bold' } },
  { selector:'node[status="active"]', style:{ 'border-color':PALETTE.active, 'border-width':2.5 } },
  { selector:'node[status="idle"]', style:{ 'border-color':PALETTE.idle, 'border-width':2.5 } },
  { selector:'node[status="completed"]', style:{ 'border-color':PALETTE.completed } },
  { selector:'node[status="unknown"]', style:{ 'border-color':PALETTE.unknown } },
  { selector:'node.sel', style:{ 'background-color':PALETTE.accent, 'color':'#fff', 'border-color':'#fff', 'border-width':2.5 } },
  { selector:'edge', style:{ 'width':1.4, 'line-color':PALETTE.line, 'curve-style':'bezier',
      'target-arrow-shape':'none' } },
  { selector:'node.dimmed', style:{ 'opacity':0.25 } },
];

function layout(){ return { name:'breadthfirst', directed:true, roots:'#root',
  spacingFactor:1.15, padding:30, animate:false }; }

function renderGraph(data){
  treeData = data;
  renderCards(data.missions);
  const els = buildElements(data);
  const sig = els.map(e=>e.data.id).join('|');
  if(!cy){
    cy = cytoscape({ container:$('#cy'), elements:els, style:CY_STYLE, layout:layout(),
      wheelSensitivity:0.2, minZoom:0.2, maxZoom:2.5 });
    wireGraph();
    lastSig = sig;
  } else if(sig !== lastSig){
    const pan=cy.pan(), zoom=cy.zoom();
    cy.elements().remove(); cy.add(els); cy.layout(layout()).run();
    cy.pan(pan); cy.zoom(zoom); lastSig = sig;
  } else {
    // same topology: refresh labels/status in place, keep view + selection
    for(const e of els){ if(e.data.source) continue; const n=cy.getElementById(e.data.id);
      if(n.nonempty()){ n.data('label',e.data.label); if(e.data.status!=null) n.data('status',e.data.status); } }
  }
  if(selectedId){ cy.nodes().removeClass('sel'); const n=cy.getElementById('s:'+selectedId); if(n.nonempty()) n.addClass('sel'); }
}

function toggleTask(key){ if(expanded.has(key)) expanded.delete(key); else expanded.add(key);
  lastSig=null; renderGraph(treeData); }

function wireGraph(){
  cy.on('tap', 'node[kind="task"]', e => toggleTask(e.target.data('mkey')));
  cy.on('tap', 'node[kind="session"]', e => selectSession(e.target.data('sessId')));
  // right-click to rename (avoids clashing with click-to-expand / click-to-select)
  cy.on('cxttap', 'node[kind="task"]', e => renameMission(e.target.data('mkey'), e.target.data('name')));
  cy.on('cxttap', 'node[kind="session"]', e => renameSession(e.target.data('sessId')));
}

// ---- rename ----
async function renameSession(id){
  const cur = (treeData.missions.flatMap(m=>m.sessions).find(s=>s.id===id)||{});
  const name = prompt('Rename this session:', cur.label||cur.title||'');
  if(name===null) return;
  try{ await api('/api/sessions/'+encodeURIComponent(id)+'/rename',
        {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
    toast('Renamed.'); lastSig=null; await refresh(true);
    if(selectedId===id) selectSession(id);
  }catch(e){ toast('Rename failed: '+e.message); }
}
async function renameMission(key, curName){
  const name = prompt('Rename this task group:', curName||'');
  if(name===null) return;
  try{ await api('/api/missions/'+encodeURIComponent(key)+'/rename',
        {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
    toast('Task renamed.'); lastSig=null; await refresh(true);
  }catch(e){ toast('Rename failed: '+e.message); }
}

// ---- detail pane ----
function progressBar(p){
  if(!p||!p.total) return '';
  const pct = Math.round(100*p.completed/p.total);
  return `<div class="prog"><i style="width:${pct}%"></i></div>
    <div class="dim" style="font-size:12px">${p.completed} done · ${p.in_progress} in progress · ${p.pending} pending (${pct}%)</div>`;
}
function todosHtml(todos){
  if(!todos||!todos.length) return '<div class="dim">no todo list recorded</div>';
  const icon = {completed:'✓', in_progress:'◐', pending:'○'};
  return '<ul class="todos">'+todos.map(t=>{
    const st=t.status||'pending';
    return `<li class="${st}"><span class="tick ${st}">${icon[st]||'○'}</span>
      <span>${esc(t.content)}</span></li>`; }).join('')+'</ul>';
}

async function selectSession(id){
  selectedId = id;
  try{ if(location.hash!=='#s:'+id) history.replaceState(null,'','#s:'+id); }catch(_){}
  // make sure the containing task is expanded so the node is visible
  const owner = treeData && treeData.missions.find(m=>m.sessions.some(x=>x.id===id));
  if(owner && !expanded.has(missionKey(owner)) && !$('#search').value.trim()){
    expanded.add(missionKey(owner)); lastSig=null; renderGraph(treeData);
  }
  if(cy){ cy.nodes().removeClass('sel'); const n=cy.getElementById('s:'+id);
    if(n.nonempty()){ n.addClass('sel'); cy.animate({center:{eles:n}}, {duration:250}); } }
  let s; try{ s = await api('/api/sessions/'+encodeURIComponent(id)); }
  catch(e){ $('#detail').innerHTML='<span class="dim">Load failed: '+esc(e.message)+'</span>'; return; }
  const u=s.usage||{};
  const m = (treeData.missions.find(mm=>mm.sessions.some(x=>x.id===id))||{});
  $('#detail').innerHTML = `
    <h3 style="margin-top:0"><span class="badge ${s.status}">${s.status}</span>${esc(sessionName(s))}
      <span class="rename" id="rnSess">✎ rename</span></h3>
    <dl>
      <dt>id</dt><dd class="mono">${esc(s.id)}</dd>
      <dt>task</dt><dd>${unk(missionName(m))} <span class="rename" id="rnMiss">✎</span></dd>
      <dt>project root</dt><dd class="mono">${unk(s.project_root)}</dd>
      <dt>cwd</dt><dd class="mono">${unk(s.cwd)}</dd>
      <dt>model</dt><dd>${unk(s.model)}</dd>
      <dt>tokens in/out</dt><dd>${u.total_tokens!=null? esc(u.input_tokens+' / '+u.output_tokens):'<span class="dim">unknown</span>'}</dd>
      <dt>total tokens</dt><dd>${u.total_tokens!=null? esc(u.total_tokens.toLocaleString()):'<span class="dim">unknown</span>'}</dd>
      <dt>est. cost</dt><dd>${u.estimated_cost!=null? '$'+esc(u.estimated_cost):'<span class="dim">unknown</span>'}</dd>
      <dt>updated</dt><dd>${unk(s.updated_at)}</dd>
    </dl>
    <div class="actions">
      <button id="btnResume" class="primary">▶ Resume session</button>
      <button id="btnCopyResume">Copy resume cmd</button>
      <button id="btnOpen">Open terminal</button>
      <button id="btnRead">Read file</button>
    </div>
    <div class="sec"><b>Task progress</b>${progressBar(s.progress)}${todosHtml(s.todos)}</div>
    <div class="sec"><b>Sub-agents (${(s.subagents||[]).length})</b>
      ${(s.subagents&&s.subagents.length)? '<div id="cySub"></div>' : '<div class="dim">no sub-agents spawned</div>'}</div>
    <div class="sec"><b>Evidence</b>${(s.evidence||[]).map(e=>`<div class="evid">• ${esc(e.kind)}: ${esc(e.detail)}</div>`).join('')||'<div class="evid dim">none</div>'}</div>
    <div id="reader" style="display:none"></div>`;

  $('#rnSess').onclick = ()=>renameSession(id);
  $('#rnMiss').onclick = ()=> m && renameMission(missionKey(m), missionName(m));
  $('#btnResume').onclick = async ()=>{
    let pre; try{ pre=await api('/api/sessions/'+encodeURIComponent(id)+'/resume-command'); }catch(e){ toast(e.message); return; }
    if(!pre.command){ toast('Cannot resume: '+(pre.reason||'unknown')); return; }
    if(!confirm('Run: '+pre.command.join(' ')+'\\n(cwd: '+pre.cwd+')')) return;
    try{ await api('/api/sessions/'+encodeURIComponent(id)+'/resume',{method:'POST'});
      toast('Resuming in a new terminal…'); }catch(e){ toast('Resume failed: '+e.message); }
  };
  $('#btnCopyResume').onclick = ()=>{ navigator.clipboard.writeText('claude --resume '+s.id); toast('Copied: claude --resume '+s.id.slice(0,8)+'…'); };
  $('#btnOpen').onclick = async ()=>{
    const pre = await api('/api/sessions/'+encodeURIComponent(id)+'/open-command');
    if(!pre.command){ toast('Cannot open: '+(pre.reason||'unknown')); return; }
    if(!confirm('Run: '+pre.command.join(' ')+'\\n(cwd: '+pre.cwd+')')) return;
    try{ await api('/api/sessions/'+encodeURIComponent(id)+'/open',{method:'POST'}); toast('Terminal launched.'); }
    catch(e){ toast('Failed: '+e.message); }
  };
  $('#btnRead').onclick = async ()=>{
    try{ const r=await api('/api/sessions/'+encodeURIComponent(id)+'/read');
      const el=$('#reader'); el.style.display='block'; el.textContent=r.path+'\\n\\n'+r.content; }
    catch(e){ toast('Read failed: '+e.message); }
  };
  if(s.subagents && s.subagents.length) renderSubgraph(s);
}

// ---- agent -> subagent chart ----
function renderSubgraph(s){
  const els = [{ data:{ id:'root', label:sessionName(s)+'\\n(main agent)', main:1 } }];
  (s.subagents||[]).forEach((a,i)=>{
    const id='a'+i;
    const lbl = (a.agent_type||'agent') + (a.description? '\\n'+a.description.slice(0,40):'');
    els.push({ data:{ id, label:lbl, tokens:a.total_tokens||0 } });
    els.push({ data:{ id:'e'+i, source:'root', target:id } });
  });
  if(cySub){ try{cySub.destroy();}catch(_){}}
  cySub = cytoscape({ container:$('#cySub'), elements:els,
    layout:{ name:'breadthfirst', directed:true, roots:'#root', padding:12, spacingFactor:1.1, animate:false },
    wheelSensitivity:0.2, minZoom:0.3, maxZoom:2.5,
    style:[
      { selector:'node', style:{ 'label':'data(label)', 'color':PALETTE.fg, 'font-size':9,
          'text-wrap':'wrap', 'text-max-width':110, 'text-valign':'center', 'text-halign':'center',
          'width':'label','height':'label','padding':'6px','shape':'round-rectangle',
          'background-color':PALETTE.panel,'border-width':1.5,'border-color':PALETTE.task } },
      { selector:'node[main=1]', style:{ 'background-color':PALETTE.accent,'color':'#fff','border-color':PALETTE.accent,'font-weight':'bold' } },
      { selector:'edge', style:{ 'width':1.4,'line-color':PALETTE.task,'curve-style':'bezier',
          'target-arrow-shape':'triangle','target-arrow-color':PALETTE.task,'arrow-scale':0.8 } },
    ]});
}

// ---- refresh loop ----
async function refresh(force){
  if(paused && !force) return;
  try{
    const data = await api('/api/tree');
    renderGraph(data);
    $('#refreshInfo').textContent = 'refreshed '+new Date().toLocaleTimeString();
    if(!didInitFocus){
      didInitFocus = true;
      const m = (location.hash||'').match(/^#s:(.+)$/);
      if(m && data.missions.some(mm=>mm.sessions.some(s=>s.id===decodeURIComponent(m[1]))))
        selectSession(decodeURIComponent(m[1]));
    }
  }catch(e){ $('#refreshInfo').textContent = 'refresh failed: '+e.message; }
}
$('#pauseBtn').onclick = ()=>{ paused=!paused; $('#pauseBtn').textContent = paused?'Resume':'Pause'; };
$('#fitBtn').onclick = ()=> cy && cy.fit(null, 40);
$('#search').addEventListener('input', ()=>{ if(treeData){ lastSig=null; renderGraph(treeData); }});
refresh();
setInterval(refresh, 4000);
</script>
</body>
</html>
